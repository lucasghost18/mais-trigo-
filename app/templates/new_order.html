{% extends 'layout.html' %}

{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">
{% endblock %}

{% block content %}
  <h3>Novo Pedido</h3>
  <form method="post" id="order-form">
    <div class="mb-3 row">
      <div class="col-md-3">
        <label class="form-label">Cliente</label>
        <input class="form-control" name="customer" placeholder="Nome do cliente">
      </div>
      <div class="col-md-3">
        <label class="form-label">Vendedor</label>
        <select class="form-select" name="vendor_id" id="vendor-select">
          <option value="">-- Outro / Sem vendedor --</option>
          {% for v in vendors %}
            <option value="{{ v.id }}">{{ v.name }}</option>
          {% endfor %}
        </select>
        <input class="form-control mt-2" name="vendor" id="vendor-other" placeholder="Nome do vendedor (se não selecionado)">
      </div>
      <div class="col-md-3">
        <label class="form-label">Endereço</label>
        <input class="form-control" name="address" placeholder="Rua, nº, bairro">
      </div>
      <div class="col-md-3">
        <label class="form-label">Cidade</label>
        <input class="form-control" name="city" placeholder="Cidade - UF">
      </div>
    </div>
    <div class="mb-3 row">
      <div class="col-md-4">
        <label class="form-label">Telefone</label>
        <input class="form-control" name="phone" placeholder="(00) 00000-0000">
      </div>
      <div class="col-md-4">
        <label class="form-label">CNPJ</label>
        <input class="form-control" name="cnpj" placeholder="00.000.000/0000-00">
      </div>
      <div class="col-md-4">
        <label class="form-label">Observação</label>
        <input class="form-control" name="notes" placeholder="Observações do pedido">
      </div>
    </div>

    <div id="items">
      <!-- item rows will be added here -->
    </div>

    <div class="mb-3 text-end">
      <h5>Total do pedido: <span id="order-total">R$ 0,00</span></h5>
    </div>

    <input type="hidden" id="item-count" name="item-count" value="0">

    <div class="mb-3">
      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="addItem()">Adicionar item</button>
    </div>

    <div class="mb-3">
      <label class="form-label">Opção de impressão</label>
      <div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="print_method" id="pm_pdf" value="pdf" checked>
          <label class="form-check-label" for="pm_pdf">Gerar PDF (A4)</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="print_method" id="pm_lpr" value="lpr">
          <label class="form-check-label" for="pm_lpr">Enviar para impressora (lpr)</label>
        </div>
      </div>
    </div>

    <button class="btn btn-primary" type="submit">Criar Pedido</button>
    <a class="btn btn-link" href="/">Voltar</a>
  </form>

    <script>
    const products = {{ products|tojson }};
    let count = 0;
    const choicesInstances = {};

    function attachSelectHandlers(select, idx) {
      // when product changes, update price and total
      select.addEventListener('change', function(){
        const up = select.closest('.row').querySelector(`input[name="unit_price-${idx}"]`);
        const sel = this.selectedOptions[0];
        if (sel && sel.dataset && sel.dataset.price) {
          up.value = sel.dataset.price;
        }
        updateOrderTotal();
      });

      // attach input listener on the Choices internal input to perform AJAX search
      setTimeout(function(){
        try {
          const container = select.parentNode.querySelector('.choices');
          const inputEl = container && container.querySelector('input.choices__input');
          if (!inputEl) return;
          let searchTimer = null;
          inputEl.addEventListener('input', function(e){
            clearTimeout(searchTimer);
            const term = (e.target.value || '').trim();
            if (term.length < 1) return; // skip empty
            searchTimer = setTimeout(function(){
              fetch('{{ url_for("main.products_search") }}?q=' + encodeURIComponent(term), {headers: {'X-Requested-With': 'XMLHttpRequest'}})
                .then(resp => { if (!resp.ok) throw new Error('network'); return resp.json(); })
                .then(data => {
                  // preserve selection
                  const selVal = select.value;
                  // rebuild options
                  let opts = '<option value="">-- Outro / Selecionar --</option>';
                  data.forEach(p => {
                    let parts = [p.name || ''];
                    if (p.manufacturer) parts.push('(' + p.manufacturer + ')');
                    const label = parts.filter(Boolean).join(' - ');
                    opts += `<option value="${p.id}" data-price="${p.unit_price}" data-sku="${p.sku}" data-manufacturer="${p.manufacturer}">${label}</option>`;
                  });
                  // destroy and recreate Choices to update options safely
                  try { if (choicesInstances[idx] && typeof choicesInstances[idx].destroy === 'function') choicesInstances[idx].destroy(); } catch(e){}
                  select.innerHTML = opts;
                  const newC = new Choices(select, {searchEnabled: true, shouldSort: false, itemSelectText: '', placeholderValue: 'Digite para buscar produto...'});
                  choicesInstances[idx] = newC;
                  // restore previous selection if still present
                  if (selVal) {
                    select.value = selVal;
                  }
                  attachSelectHandlers(select, idx); // reattach handlers for new select/choices
                })
                .catch(err => { console.error('product search failed', err); });
            }, 300);
          });
        } catch (e) {
          // ignore
        }
      }, 0);
    }
    function formatCurrencyBRL(value) {
      try {
        return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0);
      } catch (e) {
        return 'R$ ' + Number(value || 0).toFixed(2).replace('.', ',');
      }
    }

    function updateOrderTotal() {
      var total = 0.0;
      var rows = document.querySelectorAll('#items .row');
      rows.forEach(function(row) {
        var qtyInput = row.querySelector('input[name^="quantity-"]');
        var priceInput = row.querySelector('input[name^="unit_price-"]');
        var q = 0, p = 0;
        if (qtyInput) {
          var qv = (qtyInput.value || '').toString().replace(',', '.');
          q = parseFloat(qv) || 0;
        }
        if (priceInput) {
          var pv = (priceInput.value || '').toString().replace(',', '.');
          p = parseFloat(pv) || 0;
        }
        total += q * p;
      });
      var el = document.getElementById('order-total');
      if (el) el.textContent = formatCurrencyBRL(total);
    }
    function addItem(product_id = '', quantity = 1, unit_price = 0.0) {
      const container = document.getElementById('items');
      const idx = count++;
      const row = document.createElement('div');
      row.className = 'row mb-2';
      row.innerHTML = `
        <div class="col-6">
          <select class="form-select product-select" name="product_id-${idx}"></select>
        </div>
        <div class="col-2">
          <input class="form-control" name="quantity-${idx}" placeholder="Quantidade" value="${quantity}">
        </div>
        <div class="col-3">
          <input class="form-control" name="unit_price-${idx}" placeholder="Preço unid" value="${unit_price}">
        </div>
        <div class="col-1">
          <button type="button" class="btn btn-danger btn-sm" onclick="this.closest('.row').remove(); updateCount()">×</button>
        </div>
      `;
      container.appendChild(row);

      // populate select options and set handlers
      const select = row.querySelector(`select[name="product_id-${idx}"]`);
      let opts = '<option value="">-- Outro / Selecionar --</option>';
      products.forEach(p => {
        let parts = [p.name || ''];
        if (p.manufacturer) parts.push('(' + p.manufacturer + ')');
        const label = parts.filter(Boolean).join(' - ');
        opts += `<option value="${p.id}" data-price="${p.unit_price}" data-sku="${p.sku}" data-manufacturer="${p.manufacturer}">${label}</option>`;
      });
      select.innerHTML = opts;

      // initialize Choices (searchable select)
      try {
        const c = new Choices(select, {searchEnabled: true, shouldSort: false, itemSelectText: '', placeholderValue: 'Digite para buscar produto...'});
        choicesInstances[idx] = c;
      } catch (e) {
        console.warn('Choices not available yet', e);
      }

      if (product_id) select.value = product_id;
      attachSelectHandlers(select, idx);

      // update total when quantity or price inputs change
      row.addEventListener('input', function(e){
        if (e.target && (e.target.name.startsWith('quantity-') || e.target.name.startsWith('unit_price-'))) {
          updateOrderTotal();
        }
      });

      updateCount();
    }

    function updateCount(){
      document.getElementById('item-count').value = document.querySelectorAll('#items .row').length;
      updateOrderTotal();
    }
    </script>

    {% block scripts %}
      {{ super() }}
      <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
      <script>
        document.addEventListener('DOMContentLoaded', function() {
          // add two default item rows after Choices.js is available
          addItem('',1,0.0);
          addItem('',1,0.0);
        });
      </script>
    {% endblock %}

{% endblock %}
