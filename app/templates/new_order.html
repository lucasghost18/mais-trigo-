{% extends 'layout.html' %}

{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">
{% endblock %}

{% block content %}
  <h3>Novo Pedido</h3>
  <form method="post" id="order-form">
    <div class="mb-3 row">
      <div class="col-md-3">
        <label class="form-label">Cliente</label>
        <input class="form-control" name="customer" placeholder="Nome do cliente">
      </div>
      <div class="col-md-3">
        <label class="form-label">Vendedor</label>
        <select class="form-select" name="vendor_id" id="vendor-select">
          <option value="">-- Outro / Sem vendedor --</option>
          {% for v in vendors %}
            <option value="{{ v.id }}">{{ v.name }}</option>
          {% endfor %}
        </select>
        <input class="form-control mt-2" name="vendor" id="vendor-other" placeholder="Nome do vendedor (se não selecionado)">
      </div>
      <div class="col-md-3">
        <label class="form-label">Endereço</label>
        <input class="form-control" name="address" placeholder="Rua, nº, bairro">
      </div>
      <div class="col-md-3">
        <label class="form-label">Cidade</label>
        <input class="form-control" name="city" placeholder="Cidade - UF">
      </div>
    </div>
    <div class="mb-3 row">
      <div class="col-md-4">
        <label class="form-label">Telefone</label>
        <input class="form-control" name="phone" placeholder="(00) 00000-0000">
      </div>
      <div class="col-md-4">
        <label class="form-label">CNPJ</label>
        <input class="form-control" name="cnpj" placeholder="00.000.000/0000-00">
      </div>
      <div class="col-md-4">
        <label class="form-label">Observação</label>
        <input class="form-control" name="notes" placeholder="Observações do pedido">
      </div>
    </div>

    <div id="items">
      <!-- item rows will be added here -->
    </div>

    <input type="hidden" id="item-count" name="item-count" value="0">

    <div class="mb-3">
      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="addItem()">Adicionar item</button>
    </div>

    <div class="mb-3">
      <label class="form-label">Opção de impressão</label>
      <div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="print_method" id="pm_pdf" value="pdf" checked>
          <label class="form-check-label" for="pm_pdf">Gerar PDF (A4)</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="print_method" id="pm_lpr" value="lpr">
          <label class="form-check-label" for="pm_lpr">Enviar para impressora (lpr)</label>
        </div>
      </div>
    </div>

    <button class="btn btn-primary" type="submit">Criar Pedido</button>
    <a class="btn btn-link" href="/">Voltar</a>
  </form>

    <script>
    const products = {{ products|tojson }};
    let count = 0;
    function addItem(product_id = '', quantity = 1, unit_price = 0.0) {
      const container = document.getElementById('items');
      const idx = count++;
      const row = document.createElement('div');
      row.className = 'row mb-2';
      row.innerHTML = `
        <div class="col-5">
          <select class="form-select product-select" name="product_id-${idx}"></select>
        </div>
        <div class="col-2">
          <input class="form-control" name="unit_weight-${idx}" placeholder="Peso (kg)" value="0.0" readonly>
        </div>
        <div class="col-2">
          <input class="form-control" name="quantity-${idx}" placeholder="Quantidade" value="${quantity}">
        </div>
        <div class="col-2">
          <input class="form-control" name="unit_price-${idx}" placeholder="Preço unid" value="${unit_price}">
        </div>
        <div class="col-1">
          <button type="button" class="btn btn-danger btn-sm" onclick="this.closest('.row').remove(); updateCount()">×</button>
        </div>
      `;
      container.appendChild(row);

      // populate select options and set handlers
      const select = row.querySelector(`select[name="product_id-${idx}"]`);
      let opts = '<option value="">-- Outro / Selecionar --</option>';
      products.forEach(p => {
        const label = p.manufacturer ? `${p.name} (${p.manufacturer})` : p.name;
        opts += `<option value="${p.id}" data-price="${p.unit_price}" data-sku="${p.sku}" data-manufacturer="${p.manufacturer}" data-weight="${p.weight}">${label}</option>`;
      });
      select.innerHTML = opts;

      // initialize Choices (searchable select) if available
      try {
        new Choices(select, {searchEnabled: true, shouldSort: false, itemSelectText: ''});
      } catch (e) {
        // Choices may not be loaded yet; harmless fallback
        console.warn('Choices not available yet', e);
      }

      if (product_id) select.value = product_id;
      select.addEventListener('change', function(){
        const up = row.querySelector(`input[name="unit_price-${idx}"]`);
        const weightInput = row.querySelector(`input[name="unit_weight-${idx}"]`);
        const sel = this.selectedOptions[0];
        if (sel && sel.dataset && sel.dataset.price) {
          up.value = sel.dataset.price;
        }
        if (sel && sel.dataset && sel.dataset.weight) {
          weightInput.value = sel.dataset.weight;
        }
      });

      updateCount();
    }

    function updateCount(){
      document.getElementById('item-count').value = document.querySelectorAll('#items .row').length;
    }
    </script>

    {% block scripts %}
      {{ super() }}
      <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
      <script>
        document.addEventListener('DOMContentLoaded', function() {
          // add two default item rows after Choices.js is available
          addItem('',1,0.0);
          addItem('',1,0.0);
        });
      </script>
    {% endblock %}

{% endblock %}
