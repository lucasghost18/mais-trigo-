{% extends 'layout.html' %}

{% block content %}
  <div class="d-flex justify-content-between mb-3">
    <h3>Produtos</h3>
    <a class="btn btn-primary" href="{{ url_for('main.new_product') }}">Novo Produto</a>
  </div>

  <table class="table table-sm">
    <thead>
      <tr><th>Nome</th><th>Fabricante</th><th>Referência</th><th class="text-end">Unitário</th><th>Ações</th></tr>
    </thead>
    <tbody>
      {% for p in products %}
        <tr>
          <td>{{ p.name }}</td>
          <td>{{ p.manufacturer or '' }}</td>
          <td>{{ p.sku }}</td>
          <td class="text-end">{{ '%.2f'|format(p.unit_price or 0.0) }}</td>
          <td>
            <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('main.edit_product', product_id=p.id) }}">Editar</a>
            <form method="post" action="{{ url_for('main.delete_product', product_id=p.id) }}" style="display:inline-block; margin-left:6px;" onsubmit="return confirm('Remover produto {{ p.name }}?');">
              <button class="btn btn-sm btn-danger" type="submit">Excluir</button>
            </form>
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>

{% endblock %}
