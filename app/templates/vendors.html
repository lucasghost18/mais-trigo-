{% extends 'layout.html' %}

{% block content %}
  <div class="d-flex justify-content-between mb-3">
    <h3>Vendedores</h3>
    <a class="btn btn-primary" href="{{ url_for('main.new_vendor') }}">Novo Vendedor</a>
  </div>

  <table class="table table-sm">
    <thead>
      <tr><th>Nome</th><th>Telefone</th><th>Email</th></tr>
    </thead>
    <tbody>
      {% for v in vendors %}
        <tr>
          <td>{{ v.name }}</td>
          <td>{{ v.phone }}</td>
          <td>{{ v.email }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>

{% endblock %}
