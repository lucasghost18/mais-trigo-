{% extends 'layout.html' %}

{% block content %}
  <div class="d-flex justify-content-between mb-3">
    <h3>Vendedores</h3>
    <a class="btn btn-primary" href="{{ url_for('main.new_vendor') }}">Novo Vendedor</a>
  </div>

  <table class="table table-sm">
    <thead>
      <tr><th>Nome</th><th>Telefone</th><th>Email</th><th>Ações</th></tr>
    </thead>
    <tbody>
      {% for v in vendors %}
        <tr>
          <td>{{ v.name }}</td>
          <td>{{ v.phone }}</td>
          <td>{{ v.email }}</td>
          <td>
            <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('main.edit_vendor', vendor_id=v.id) }}">Editar</a>
            <form method="post" action="{{ url_for('main.delete_vendor', vendor_id=v.id) }}" style="display:inline-block; margin-left:6px;" onsubmit="return confirm('Remover vendedor {{ v.name }}?');">
              <button class="btn btn-sm btn-danger" type="submit">Excluir</button>
            </form>
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>

{% endblock %}
