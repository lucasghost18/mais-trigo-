<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Mais Trigo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 1rem;
      box-shadow: 0 0.5rem 1.5rem rgba(0,0,0,0.08);
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
    }
    .login-logo-wrap {
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .login-logo-wrap img {
      max-width: 80px;
      max-height: 80px;
      width: auto;
      height: auto;
      display: inline-block;
      border-radius: 10px;
      object-fit: contain;
    }
    .login-title {
      font-weight: 700;
      text-align: center;
      margin-bottom: 1.5rem;
      color: #333;
    }
    .form-control {
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      font-size: 1rem;
    }
    .btn-login {
      width: 100%;
      padding: 0.75rem;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 1rem;
    }
    .alert {
      border-radius: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo-wrap">
      <img src="/static/logo.png" alt="Mais Trigo">
    </div>
    <h4 class="login-title">Mais Trigo</h4>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST" action="{{ url_for('main.login') }}">
      <div class="mb-3">
        <label for="username" class="form-label">Usuário</label>
        <input type="text" class="form-control" id="username" name="username" placeholder="Digite o usuário" required autofocus>
      </div>
      <div class="mb-4">
        <label for="password" class="form-label">Senha</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="Digite a senha" required>
      </div>
      <button type="submit" class="btn btn-primary btn-login">Entrar</button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
