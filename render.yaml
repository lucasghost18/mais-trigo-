services:
  - type: web
    name: mais-trigo
    env: python
    plan: free
    region: oregon
    rootDir: mais-trigo--feature-update-readme
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///instance/orders.db
      - key: PRINTER_OUTPUT_DIR
        value: prints
    disk:
      name: mais-trigo-data
      mountPath: /opt/render/project/src/instance
      sizeGB: 1

